# act_runner for Gitea Actions — minimal single-runner setup.
# Register a runner token in Gitea: Site Administration -> Actions -> Runners
# (or at repo/org level for scoped runners), then put it in RUNNER_TOKEN.
services:
  act_runner:
    image: gitea/act_runner:latest
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL: https://git.example.com
      GITEA_RUNNER_REGISTRATION_TOKEN: ${RUNNER_TOKEN}
      GITEA_RUNNER_NAME: primary-runner
      # Optional: point at a config.yaml for custom labels, cache, etc.
      # CONFIG_FILE: /config/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - act_runner_data:/data

volumes:
  act_runner_data:
