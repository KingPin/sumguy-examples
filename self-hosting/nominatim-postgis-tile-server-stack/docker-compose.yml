services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: maps
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    shm_size: 1gb
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=2GB"
      - "-c"
      - "max_wal_size=8GB"

  nominatim:
    image: mediagis/nominatim:4.5
    container_name: nominatim
    ports:
      - "8080:8080"
    environment:
      PBF_URL: https://download.geofabrik.de/north-america-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/north-america-updates/
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD}
      IMPORT_STYLE: full
      THREADS: 4
    volumes:
      - nominatim-data:/var/lib/postgresql/16/main
      - nominatim-flatnode:/nominatim/flatnode
    shm_size: 1gb
    restart: unless-stopped

  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: martin
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/maps
    volumes:
      - ./martin-config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nominatim
      - martin
    restart: unless-stopped

volumes:
  postgres-data:
  nominatim-data:
  nominatim-flatnode:
  caddy-data:
  caddy-config:
