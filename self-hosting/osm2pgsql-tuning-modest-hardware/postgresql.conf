# postgresql.conf — tuned for osm2pgsql bulk import
# Apply BEFORE running osm2pgsql, revert AFTER.
# These settings trade crash safety for import speed.

# RAM allocation (~25% of system RAM for shared_buffers)
shared_buffers = 4GB
maintenance_work_mem = 2GB         # for index builds
work_mem = 256MB                   # per sort/hash operation

# Checkpoint / WAL — loosen for import speed
checkpoint_completion_target = 0.9
wal_buffers = 256MB
max_wal_size = 4GB
min_wal_size = 1GB

# Parallel index builds (Postgres 11+)
max_parallel_maintenance_workers = 4
max_parallel_workers_per_gather = 4
max_parallel_workers = 8

# Danger zone — NEVER leave these in production
fsync = off
synchronous_commit = off
full_page_writes = off
# wal_level = minimal   # uncomment only if you don't need WAL archiving; requires restart
