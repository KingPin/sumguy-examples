[general]
; Path inside the container — matches the volume mount in docker-compose.isso.yml
dbpath = /db/comments.db
; Public URL of your blog (not the Isso server URL)
host = https://yourdomain.com

[moderation]
; Hold comments for approval before they appear
enabled = true
; Purge rejected comments after 30 days
purge-after = 30d

[smtp]
username = comments@yourdomain.com
password = your-smtp-password
host = smtp.yourdomain.com
port = 587
to = you@yourdomain.com
from = comments@yourdomain.com
security = starttls

[guard]
; Basic spam protection — require a name field
enabled = true
ratelimit = 2

[markup]
; Allow basic markdown in comments
options = strikethrough, superscript, autolink
